<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Clinical Insight</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 80%; margin: auto; }
        .form-section, .analysis-section { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nursing Clinical Insight</h1>
        <h2>Patient Vitals Form</h2>
        <form id="vitalsForm">
            <label for="patientName">Patient Name:</label>
            <input type="text" id="patientName" required><br><br>
            <label for="patientAge">Patient Age:</label>
            <input type="number" id="patientAge" required><br><br>
            <label for="bloodPressure">Blood Pressure:</label>
            <input type="text" id="bloodPressure" required><br><br>
            <label for="heartRate">Heart Rate:</label>
            <input type="text" id="heartRate" required><br><br>
            <button type="submit">Submit</button>
        </form>
        <div class="analysis-section">
            <h2>AI Analysis Output</h2>
            <div id="aiOutput">Results will be displayed here...</div>
        </div>
    </div>
    <script>
        const form = document.getElementById('vitalsForm');
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            // Placeholder for AI analysis logic
            document.getElementById('aiOutput').innerHTML = 'Analysis based on provided vitals...';
        });
    </script>
</body>
</html>
